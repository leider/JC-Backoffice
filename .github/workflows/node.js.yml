# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "yarn"
      - name: set timezone Berlin
        run: sudo timedatectl set-timezone Europe/Berlin
      - name: install
        run: |
          cd application
          yarn install --immutable
      - name: lint
        run: |
          cd application
          yarn eslint
      - name: deploy
        run: |
          cd application
          yarn deploy
      - name: test
        run: |
          cd application
          yarn test
      - name: UI Tests
        run: |
          cd frontendtests
          yarn install --immutable
          yarn eslint
          yarn playwright install chromium
          yarn tsc
          ./node_modules/.bin/codeceptjs info
          ./startTestserver.sh
          trap './stopTestserver.sh' EXIT
          mkdir -p output
          set +e
          ./node_modules/.bin/codeceptjs run 2>&1 | tee output/first_run.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            FAILED=$(grep '◯ File:' output/first_run.log | sed 's|.*file://||' | sort -u)
            if [ -n "$FAILED" ]; then
              echo "UI tests failed - rerunning only failed test files with verbose logging"
              ./node_modules/.bin/codeceptjs run --verbose $FAILED
              TEST_EXIT=$?
            fi
          fi
          exit $TEST_EXIT
      - name: Archive UI test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-build-results
          path: frontendtests/output
      - name: Download all workflow run artifacts
        if: always()
        uses: actions/download-artifact@v7
