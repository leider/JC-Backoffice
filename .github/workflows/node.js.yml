name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "yarn"
      - name: set timezone Berlin
        run: sudo timedatectl set-timezone Europe/Berlin
      - name: install
        run: |
          cd application
          yarn install --immutable
      - name: lint
        run: |
          cd application
          yarn eslint
      - name: deploy
        run: |
          cd application
          yarn deploy
      - name: Upload workspace
        uses: actions/upload-artifact@v6
        with:
          name: workspace
          path: application/
          include-hidden-files: true
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
      - name: set timezone Berlin
        run: sudo timedatectl set-timezone Europe/Berlin
      - name: Download workspace
        uses: actions/download-artifact@v7
        with:
          name: workspace
          path: application/
      - name: Restore permissions and Yarn state
        run: |
          cd application
          chmod -R +x node_modules/.bin
          yarn install --immutable
      - name: test
        run: |
          cd application
          yarn test

  ui-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
      - name: set timezone Berlin
        run: sudo timedatectl set-timezone Europe/Berlin
      - name: Download workspace
        uses: actions/download-artifact@v7
        with:
          name: workspace
          path: application/
      - name: UI Tests
        run: |
          cd frontendtests
          yarn install --immutable
          yarn eslint
          yarn playwright install chromium
          yarn tsc
          ./node_modules/.bin/codeceptjs info
          ./startTestserver.sh
          trap './stopTestserver.sh' EXIT
          mkdir -p output
          set +e
          ./node_modules/.bin/codeceptjs run 2>&1 | tee output/first_run.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -ne 0 ]; then
            FAILED=$(grep '◯ File:' output/first_run.log | sed 's|.*file://||' | sort -u)
            if [ -n "$FAILED" ]; then
              echo "UI tests failed - rerunning only failed test files with verbose logging"
              ./node_modules/.bin/codeceptjs run --verbose $FAILED
              TEST_EXIT=$?
            fi
          fi
          exit $TEST_EXIT
      - name: Archive UI test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-test-results
          path: frontendtests/output
